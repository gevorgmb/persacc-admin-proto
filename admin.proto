syntax = "proto3";

package admin;

option go_package = "persacc/api/v1/admin;adminpb";

import "user.proto";
import "role.proto";
import "customer.proto";
import "permission.proto";
import "oauth.proto";
import "organization.proto";
import "product.proto";
import "product_category.proto";
import "supplier.proto";
import "vendor.proto";


service AdminService {
    rpc Register(RegisterRequest) returns (RegisterResponse);

    rpc OAuthRegister(OAuthRegisterRequest) returns (OAuthRegisterResponse);
    rpc OAuthToken(OAuthTokenRequest) returns (OAuthTokenResponse);
    rpc OAuthVerify(OAuthVerifyRequest) returns (OAuthVerifyResponse);
    rpc OAuthRefresh(OAuthRefreshRequest) returns (OAuthRefreshResponse);

    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    rpc CreateCustomer(CreateCustomerRequest) returns (CreateCustomerResponse);
    rpc GetCustomer(GetCustomerRequest) returns (GetCustomerResponse);
    rpc UpdateCustomer(UpdateCustomerRequest) returns (UpdateCustomerResponse);
    rpc DeleteCustomer(DeleteCustomerRequest) returns (DeleteCustomerResponse);
    rpc ListCustomers(ListCustomersRequest) returns (ListCustomersResponse);

    rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
    rpc GetRole(GetRoleRequest) returns (GetRoleResponse);
    rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
    rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
    rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);

    rpc CreatePermission(CreatePermissionRequest) returns (CreatePermissionResponse);
    rpc GetPermission(GetPermissionRequest) returns (GetPermissionResponse);
    rpc UpdatePermission(UpdatePermissionRequest) returns (UpdatePermissionResponse);
    rpc DeletePermission(DeletePermissionRequest) returns (DeletePermissionResponse);
    rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);

    rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
    rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
    rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
    rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);
    rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);

    rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
    rpc GetProduct(GetProductRequest) returns (GetProductResponse);
    rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
    rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
    rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

    rpc CreateProductCategory(CreateProductCategoryRequest) returns (CreateProductCategoryResponse);
    rpc GetProductCategory(GetProductCategoryRequest) returns (GetProductCategoryResponse);
    rpc UpdateProductCategory(UpdateProductCategoryRequest) returns (UpdateProductCategoryResponse);
    rpc DeleteProductCategory(DeleteProductCategoryRequest) returns (DeleteProductCategoryResponse);
    rpc ListProductCategories(ListProductCategoriesRequest) returns (ListProductCategoriesResponse);

    rpc CreateSupplier(CreateSupplierRequest) returns (CreateSupplierResponse);
    rpc GetSupplier(GetSupplierRequest) returns (GetSupplierResponse);
    rpc UpdateSupplier(UpdateSupplierRequest) returns (UpdateSupplierResponse);
    rpc DeleteSupplier(DeleteSupplierRequest) returns (DeleteSupplierResponse);
    rpc ListSuppliers(ListSuppliersRequest) returns (ListSuppliersResponse);

    rpc CreateVendor(CreateVendorRequest) returns (CreateVendorResponse);
    rpc GetVendor(GetVendorRequest) returns (GetVendorResponse);
    rpc UpdateVendor(UpdateVendorRequest) returns (UpdateVendorResponse);
    rpc DeleteVendor(DeleteVendorRequest) returns (DeleteVendorResponse);
    rpc ListVendors(ListVendorsRequest) returns (ListVendorsResponse);
}
