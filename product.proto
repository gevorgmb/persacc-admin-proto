syntax = "proto3";

package admin;

option go_package = "persacc/api/v1/admin;adminpb";

message Product {
    int64 id = 1;
    int64 organization_id = 2;
    string sku = 3;
    string name = 4;
    string description = 5;
    string created_at = 6;
    string updated_at = 7;
    string deleted_at = 8;
    map<string, string> additional_details = 9;
    int64 category_id = 10;
    int64 vendor_id = 11;
    string vendor_product_code = 12;
}

message CreateProductRequest {
    string sku = 1;
    string name = 2;
    string description = 3;
    map<string, string> additional_details = 4;
    int64 category_id = 5;
    int64 vendor_id = 6;
    string vendor_product_code = 7;
}

message CreateProductResponse {
    Product product = 1;
}

message GetProductRequest {
    int64 id = 1;
}

message GetProductResponse {
    Product product = 1;
}

message UpdateProductRequest {
    int64 id = 1;
    string sku = 2;
    string name = 3;
    string description = 4;
    map<string, string> additional_details = 5;
    int64 category_id = 6;
    int64 vendor_id = 7;
    string vendor_product_code = 8;
}

message UpdateProductResponse {
    Product product = 1;
}

message DeleteProductRequest {
    int64 id = 1;
}

message DeleteProductResponse {
    bool success = 1;
}

message ListProductsRequest {
    int32 page = 1;
    int32 limit = 2;
    string name = 3;
    string sku = 4;
    string description = 5;
}

message ListProductsResponse {
    repeated Product products = 1;
    int32 total = 2;
    int32 page = 3;
    int32 limit = 4;
}
